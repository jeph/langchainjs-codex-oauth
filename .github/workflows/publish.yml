name: Publish to npm

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check npm version
        id: version
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$package_version" >> "$GITHUB_OUTPUT"

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "$package_name@$package_version is already published."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$package_name@$package_version has not been published."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.version.outputs.publish == 'true'
        run: |
          pnpm run clean
          pnpm run build:dist

      - name: Publish package
        if: steps.version.outputs.publish == 'true'
        run: npm publish --ignore-scripts --access public --provenance

      - name: Check GitHub release
        id: github_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_name="${{ steps.version.outputs.tag_name }}"

          if gh release view "$tag_name" >/dev/null 2>&1; then
            echo "$tag_name already has a GitHub Release."
            echo "create=false" >> "$GITHUB_OUTPUT"
          else
            echo "$tag_name does not have a GitHub Release yet."
            echo "create=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.github_release.outputs.create == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package_name="${{ steps.version.outputs.package_name }}"
          package_version="${{ steps.version.outputs.package_version }}"
          tag_name="${{ steps.version.outputs.tag_name }}"

          gh release create "$tag_name" \
            --target "$GITHUB_SHA" \
            --title "$tag_name" \
            --notes "Published to npm: https://www.npmjs.com/package/${package_name}/v/${package_version}"
